<!DOCTYPE html>
<html >
<head>
    <title>Ticket Booking</title>
    <style>
        .parent{
            width: 1000px;
            height: 700px;
            margin-left: 2%;
        }
        .header{
            width: 1000px;
            height: 80px;
            display: flex;
        }
        .back{
            width: 1000px;
            height: 620px;
            background-image: url(https://media.assettype.com/bloombergquint%2F2023-08%2Fcde1aca1-9bf5-4a6d-bc4a-65eee87ced68%2FIRCTC_Time_table_Eng.jpg?auto=format%2Ccompress&w=732);
            background-size: cover;
        }
        .he1{
            width: 420px;
            height: 30px;
            display: flex;
            justify-content: space-between;
            color: white;
            text-align: center;
        }
        .pnr{
            width: 207px;
            height: 30px;
            background-color: rgb(11, 11, 150);
            align-content: center;
        }
        .chart{
            width: 207px;
            height: 30px;
            background-color: rgb(11, 11, 150);
            align-content: center;
        }
        .mid{
            width: 420px;
            height: 450px;
            background-color: white;
        }
        .book{
            width: 420px;
            height: 70px;
            color: rgb(11, 11, 150);
            align-content: center;
            text-align: center;
            font-weight: bolder;
            font-size: xx-large;
        }
        .main{
            position: relative;
            top: 60px;
            left: 50px;
        }
        .a{
            width: 150px;
            height: 40px;
            border: 1px solid black;
            align-content: center;
            text-align: center;
        }
        .con1{
            margin-top: 2%;
            display: flex;
            justify-content: space-evenly;
        }
        .con2{
            display: flex;
            justify-content: space-evenly;
            margin-top: -5%;
        }
        .con3{
            display: flex;
            justify-content: space-between;
            margin-top: 5%;
            position: relative;
            left: 40px;
        }
        .sign{
            position: relative;
            left: 110px;
            bottom: 10px;
        }
        .inner{
            display: flex;
            margin-top: 20px;
            position: relative;
            left: 41px;
        }
        .box{
            width: 20px;
            height: 20px;
            background-color: skyblue;
            opacity: 80%;
        }
        .w1{
            color: rgb(11, 11, 150);
            font-weight: bold;
            margin-left: 2%;
        }
        #a2{
            margin-top: 2%;
        }
        .end{
            display: flex;
            justify-content: space-evenly;
            margin: 3%;
        }
        .search{
            width: 100px;
            height: 35px;
            background-color: orange;
            color: white;
            font-size: large;
            text-align: center;
            align-content: center;
            border-radius: 10px;
            font-weight: bold;
        }
        .easy{
            width: 210px;
            height: 35px;
            background-color: orange;
            color: white;
            font-weight: bold;
            text-align: center;
            align-content: center;
            border-radius: 10px;
        }
        .footer{
            width: 420px;
            height: 50px;
            background-color: white;
            margin-top: 6%;
            color: blue;
            text-align: center;
            align-content: center;
        }
        #log1{
            width: 70px;
            margin-top: 5px;
            margin-left: 10px;
        }
        #log2{
            width: 70px;
            height: 65px;
            margin-top: 5px;
            margin-left: 800px;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="header">
            <div class="log1">
                <img src="https://www.irctc.co.in/nget/assets/images/secondry-logo.png" id="log1">
            </div>
            <div class="log2" >
                <img src="https://www.irctc.co.in/nget/assets/images/logo.png" id="log2">
            </div>
        </div>
        <div class="back">
            <div class="main">
                <div class="he1">
                    <div class="pnr">PNR STATUS</div>
                    <div class="chart">CHARTS/VACANCY</div>
                </div>
                <div class="mid">
                    <div class="book">BOOK TICKET</div>
                    <div class="con1">               
                    <div class="a">
                        From
                    </div>
                    <div class="a">DD/MM/YYYY</div></div>
                    <div class="sign"><p> &#8645;</p>
                    </div>
                    <div class="con2">
                    <div class="a">To</div>
                    <div class="a">All Classes</div>
                </div>
                <div class="con3"><div class="a">GENERAL</div>
                </div>
                <div class="write">
                    <div class="inner" id="a1">
                        <div class="box"></div>
                        <div class="w1">
                            Person With Disability Concession
                        </div>
                    </div>
                    <div class="inner" id="a2">
                        <div class="box"></div>
                        <div class="w1">
                            Flexible With Date
                        </div>
                    </div>
                    <div class="inner" id="a2">
                        <div class="box"></div>
                        <div class="w1">
                            Train With Available Birth
                        </div>
                    </div>
                    <div class="inner" id="a2">
                        <div class="box"></div>
                        <div class="w1">
                            Railway Pass Concession
                        </div>
                    </div>
                </div>
                <div class="end">
                    <div class="search">
                        Search
                    </div>
                    <div class="easy">Easy Booking On AskDISHA</div>
                </div>
                <div class="footer">
                    Please click here for Empanelment for PAD items for Catering.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
